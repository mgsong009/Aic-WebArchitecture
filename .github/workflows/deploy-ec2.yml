name: Deploy EC2 Demo

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ec2-demo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='**/.env' \
            --exclude='**/node_modules' \
            --exclude='**/dist' \
            --exclude='aic-frontend/qa-captures' \
            -czf "$RUNNER_TEMP/aic-release.tar.gz" .

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment archive
        run: |
          scp -i ~/.ssh/ec2_key "$RUNNER_TEMP/aic-release.tar.gz" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/aic-release.tar.gz"

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'REMOTE'
          set -euo pipefail

          DEPLOY_DIR="$HOME/Aic-WebArchitecture"
          NEXT_DIR="$HOME/Aic-WebArchitecture.next"
          BACKUP_DIR="$HOME/Aic-WebArchitecture.prev"

          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            echo "Missing $DEPLOY_DIR/.env. Create it on EC2 before running deployment."
            exit 1
          fi

          rm -rf "$NEXT_DIR"
          mkdir -p "$NEXT_DIR"
          tar -xzf "$HOME/aic-release.tar.gz" -C "$NEXT_DIR"
          cp "$DEPLOY_DIR/.env" "$NEXT_DIR/.env"
          chmod 600 "$NEXT_DIR/.env"

          rm -rf "$BACKUP_DIR"
          mv "$DEPLOY_DIR" "$BACKUP_DIR"
          mv "$NEXT_DIR" "$DEPLOY_DIR"

          cd "$DEPLOY_DIR"
          sudo docker compose up --build -d
          sudo docker image prune -f
          sudo docker compose ps
          REMOTE
