name: Deploy EC2 Demo

on:
  push:
    branches:
      - dev
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: ec2-demo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    env:
      DEPLOY_REF: dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Resolve deployment target
        id: target
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "Missing one or more required secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          if ! timeout 15 ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
            echo "Unable to reach EC2 SSH on $EC2_HOST:22."
            echo "Check the EC2 security group allows SSH from GitHub Actions runners, or temporarily allow TCP 22 from 0.0.0.0/0 for this demo."
            exit 1
          fi

      - name: Check deployed SHA
        id: deployed
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          deployed_sha="$(ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" 'cat "$HOME/Aic-WebArchitecture/.deployed_sha" 2>/dev/null || true')"
          if [ "$deployed_sha" = "$DEPLOY_SHA" ]; then
            echo "No deployment needed. EC2 already has $DEPLOY_SHA."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deploying $DEPLOY_SHA. Current EC2 marker: ${deployed_sha:-none}."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deployment archive
        if: steps.deployed.outputs.should_deploy == 'true'
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='**/.env' \
            --exclude='**/node_modules' \
            --exclude='**/dist' \
            --exclude='aic-frontend/qa-captures' \
            -czf "$RUNNER_TEMP/aic-release.tar.gz" .

      - name: Upload deployment archive
        if: steps.deployed.outputs.should_deploy == 'true'
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/ec2_key "$RUNNER_TEMP/aic-release.tar.gz" \
            "$EC2_USER@$EC2_HOST:~/aic-release.tar.gz"

      - name: Deploy with Docker Compose
        if: steps.deployed.outputs.should_deploy == 'true'
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "DEPLOY_SHA='$DEPLOY_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          DEPLOY_DIR="$HOME/Aic-WebArchitecture"
          NEXT_DIR="$HOME/Aic-WebArchitecture.next"
          BACKUP_DIR="$HOME/Aic-WebArchitecture.prev"

          if [ ! -f "$DEPLOY_DIR/.env" ]; then
            echo "Missing $DEPLOY_DIR/.env. Create it on EC2 before running deployment."
            exit 1
          fi

          rm -rf "$NEXT_DIR"
          mkdir -p "$NEXT_DIR"
          tar -xzf "$HOME/aic-release.tar.gz" -C "$NEXT_DIR"
          cp "$DEPLOY_DIR/.env" "$NEXT_DIR/.env"
          chmod 600 "$NEXT_DIR/.env"

          rm -rf "$BACKUP_DIR"
          mv "$DEPLOY_DIR" "$BACKUP_DIR"
          mv "$NEXT_DIR" "$DEPLOY_DIR"

          cd "$DEPLOY_DIR"
          sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
          sudo docker image prune -f
          sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
          printf '%s\n' "$DEPLOY_SHA" > "$DEPLOY_DIR/.deployed_sha"
          REMOTE
