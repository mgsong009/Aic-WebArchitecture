services:
  db:
    image: mysql:8.0
    container_name: aic_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: aic_db
      MYSQL_USER: aic_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - aic_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "aic_user", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  warehouse:
    image: postgres:16
    container_name: aic_warehouse
    restart: unless-stopped
    environment:
      POSTGRES_DB: aic_warehouse
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
    volumes:
      - warehouse_data:/var/lib/postgresql/data
    networks:
      - aic_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse_user -d aic_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline:
    build: ./aic-pipeline
    container_name: aic_pipeline
    restart: unless-stopped
    environment:
      TRANSFORMERS_CACHE: /app/models
    volumes:
      - model_cache:/app/models
    networks:
      - aic_internal

  backend:
    build: ./aic-backend
    container_name: aic_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_started
    environment:
      DB_URL: mysql+aiomysql://aic_user:${MYSQL_PASSWORD}@db:3306/aic_db?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET}
      PIPELINE_URL: http://pipeline:9000
    networks:
      - aic_internal

  elt:
    build: ./aic-elt
    container_name: aic_elt
    depends_on:
      db:
        condition: service_healthy
      warehouse:
        condition: service_healthy
    environment:
      SOURCE_DB_HOST: db
      SOURCE_DB_PORT: 3306
      SOURCE_DB_NAME: aic_db
      SOURCE_DB_USER: aic_user
      SOURCE_DB_PASSWORD: ${MYSQL_PASSWORD}
      WAREHOUSE_DB_HOST: warehouse
      WAREHOUSE_DB_PORT: 5432
      WAREHOUSE_DB_NAME: aic_warehouse
      WAREHOUSE_DB_USER: warehouse_user
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_PASSWORD}
    networks:
      - aic_internal
    profiles:
      - tools

  frontend:
    build: ./aic-frontend
    container_name: aic_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - aic_internal

networks:
  aic_internal:
    driver: bridge

volumes:
  mysql_data:
  warehouse_data:
  model_cache:
